name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o llmgate-${{ matrix.goarch }} ./cmd/llmgate

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: llmgate-${{ matrix.goarch }}
          path: llmgate-${{ matrix.goarch }}
