name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o llmgate-${{ matrix.goarch }} ./cmd/llmgate

      - name: Create release
        if: ${{ matrix.goarch == 'amd64' }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          draft: true
          generateReleaseNotes: true

      - name: Upload binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: https://uploads.github.com/repos/${{ github.repository }}/releases/assets?name=llmgate-${{ matrix.goarch }}
          asset_path: llmgate-${{ matrix.goarch }}
          asset_name: llmgate-${{ matrix.goarch }}
          asset_content_type: application/octet-stream
